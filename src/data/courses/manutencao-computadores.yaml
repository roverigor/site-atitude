slug: manutenção-computadores
nome: "Manutenção de Computadores"
categoria: tecnologia
descricao_curta: "Aprenda a montar, configurar e consertar computadores — uma habilidade valorizada em qualquer cidade."
descricao_completa: |
  O curso de Manutenção de Computadores forma técnicos preparados para montar, configurar, diagnosticar e consertar computadores desktop e notebooks. Você vai aprender sobre hardware, software, redes, formatação, instalação de sistemas operacionais e resolução dos problemas mais comuns.

  As aulas são 100% práticas em laboratório: você desmonta e monta computadores, identifica peças, faz upgrades, formata máquinas, instala drivers, configura redes Wi-Fi e resolve os problemas que clientes trazem no dia a dia. Também abordamos orçamento de peças, atendimento ao cliente e como montar sua assistência técnica.

  Toda empresa, escritório e residência precisa de alguém que entenda de computadores. Esse curso te prepara para trabalhar em assistências técnicas, lojas de informática, departamentos de TI ou como técnico autônomo — uma profissão com demanda constante na região.
