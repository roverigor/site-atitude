    valor: 150.00
    descricao: "Redação comercial, e-mails profissionais, atas de reunião e comunicação interna"
  - nome: "Controle Financeiro Básico"
    carga_horaria: "18h"
    valor: 170.00
    descricao: "Contas a pagar e receber, fluxo de caixa, conciliação bancária e emissão de boletos"
