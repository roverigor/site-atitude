slug: assistente-administrativo
nome: "Assistente Administrativo"
categoria: administracao
descricao_curta: "Formação completa para atuar como assistente administrativo em empresas de qualquer porte."
descricao_completa: |
  O curso de Assistente Administrativo prepara você para uma das funções mais demandadas do mercado de trabalho brasileiro. Você vai aprender rotinas administrativas, atendimento ao cliente, organização de documentos, controle financeiro básico e comunicação empresarial.

  As aulas combinam teoria e prática com simulações de situações reais de escritório. Você vai trabalhar com emissão de notas fiscais, controle de estoque, agendamento, protocolo de documentos, elaboração de relatórios e atendimento telefônico profissional.

  O assistente administrativo é essencial em qualquer empresa — de pequenos comércios a grandes indústrias. Com esse curso, você entra preparado para atuar com confiança e profissionalismo desde o primeiro dia de trabalho.
