slug: assistente-financeiro
nome: "Assistente Financeiro"
categoria: administracao
descricao_curta: "Domine finanças empresariais, contas a pagar/receber e fluxo de caixa para atuar no setor financeiro."
descricao_completa: |
  O curso de Assistente Financeiro forma profissionais preparados para atuar no departamento financeiro de empresas de todos os portes. Você vai aprender controle de contas a pagar e receber, fluxo de caixa, conciliação bancária, emissão de boletos e notas fiscais, além de noções de contabilidade e tributação.

  As aulas combinam teoria e prática com planilhas reais, simulações de sistemas financeiros e casos do dia a dia empresarial. Você desenvolve a capacidade de organizar as finanças de uma empresa, gerar relatórios gerenciais e apoiar a tomada de decisões financeiras.

  O setor financeiro é essencial em qualquer empresa, e profissionais qualificados nessa área sempre encontram oportunidades. Com o certificado da Atitude, você estará preparado para assumir funções financeiras com confiança e competência.
