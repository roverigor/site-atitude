descricao_curta: "Qualifique-se para trabalhar como operador de caixa em supermercados, lojas e comércio em geral."
descricao_completa: |
  O curso de Operador de Caixa forma profissionais preparados para atuar em supermercados, lojas, farmácias, padarias e qualquer estabelecimento comercial. Você vai aprender operação de caixa registradora e PDV, formas de pagamento (dinheiro, cartão, Pix), troco, fechamento de caixa, emissão de notas fiscais e atendimento ao cliente.

  As aulas são práticas, com simulações de atendimento usando equipamentos reais. Você também aprende noções de matemática comercial, prevenção de perdas, organização do posto de trabalho e como lidar com situações do dia a dia: filas, clientes insatisfeitos, troca de mercadorias e cancelamentos.

  Operador de caixa é uma das funções com maior oferta de vagas no comércio da região. Com esse curso rápido e prático, você se qualifica em 3 meses e já pode buscar sua vaga. Muitos alunos conseguem emprego antes mesmo de concluir o curso.
