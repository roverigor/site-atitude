slug: carreira-games
nome: "Carreira Games (Desenvolvimento de Jogos)"
categoria: carreiras-pro
descricao_curta: "Crie seus próprios jogos: aprenda game design, programação e arte digital para a indústria de games."
descricao_completa: |
  O Carreira Games é a formação ideal para quem sonha em trabalhar com desenvolvimento de jogos. Em 10 meses, você aprende game design, programação em C#, modelagem 3D, animação e som, criando jogos completos usando a engine Unity — a mesma usada por estúdios profissionais no mundo todo.

  O curso combina criatividade e tecnologia: você aprende a desenhar fases, criar personagens, programar mecânicas de jogo, implementar física e publicar seus jogos. Cada módulo resulta em um projeto funcional que vai para o seu portfólio de game developer.

  A indústria de jogos fatura mais que cinema e música juntos, e desenvolvedores de games têm oportunidades em estúdios, empresas de tecnologia, educação e simulação. Comece sua jornada na Atitude e transforme sua paixão por jogos em profissão.
