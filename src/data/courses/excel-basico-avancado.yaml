slug: excel-básico-avançado
nome: "Excel do Básico ao Avançado"
categoria: excel
descricao_curta: "Domine o Excel do zero até tabelas dinâmicas e funções avançadas — a habilidade mais pedida em vagas de emprego."
descricao_completa: |
  O Excel é a ferramenta mais exigida em vagas de emprego no Brasil. Esse curso leva você do básico absoluto até recursos avançados como tabelas dinâmicas, funções PROCV/SOMASE, gráficos profissionais e automação de planilhas.

  Com aulas 100% práticas, você trabalha com planilhas reais do dia a dia: controle de estoque, folha de pagamento, orçamentos, relatórios de vendas e dashboards visuais. Cada aula tem exercícios que simulam situações reais de trabalho.

  Ao final do curso, você terá confiança para resolver qualquer desafio com planilhas e se destacar em processos seletivos. O Excel avançado é um diferencial que pode aumentar seu salário em até 30% segundo pesquisas do mercado.
