slug: programação
nome: "Programação Web"
categoria: tecnologia
descricao_curta: "Aprenda a programar do zero com Python, HTML, CSS e JavaScript — o curso que abre as portas da tecnologia."
descricao_completa: |
  O curso de Programação Web é a porta de entrada para o mundo da tecnologia. Você vai aprender a criar sites, sistemas e aplicações usando as linguagens mais requisitadas do mercado: HTML, CSS, JavaScript e Python. Tudo do zero, sem necessidade de experiência prévia.

  O método é interativo: você aprende no computador com exercícios práticos, projetos guiados e desafios progressivos. Cada módulo constrói sobre o anterior, e ao final você terá criado projetos reais como um site pessoal, uma calculadora web, um sistema de cadastro e um jogo simples.

  A área de programação é a que mais cresce no Brasil, com salários acima da média e oportunidades de trabalho remoto. Mesmo em cidades menores, empresas precisam de sites, sistemas e automações. Esse curso é o primeiro passo para uma carreira com enorme potencial de crescimento.
