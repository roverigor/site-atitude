    valor: 240.00
    descricao: "Criação de posts, stories, thumbnails, banners web e templates para redes sociais"
  - nome: "UI/UX e Prototipação"
    carga_horaria: "24h"
    valor: 240.00
    descricao: "Figma, wireframes, protótipos interativos, usabilidade e design de interfaces"
