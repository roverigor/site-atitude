slug: carreira-designer
nome: "Carreira Designer (Design Completo)"
categoria: carreiras-pro
descricao_curta: "Formação completa em design: gráfico, web, UI/UX e branding para se tornar um designer versátil."
descricao_completa: |
  O Carreira Designer é a formação mais ampla da Atitude para quem quer dominar todas as áreas do design. Em 8 meses, você passa pelo design gráfico, design para web e redes sociais, UI/UX e branding, saindo preparado para atuar em qualquer segmento do mercado criativo.

  Você vai dominar Photoshop, Illustrator, Figma e Canva Pro, criando projetos reais em cada módulo: logotipos, identidades visuais, layouts de sites, posts para redes sociais, apresentações corporativas e muito mais. Tudo isso com orientação para montar um portfólio profissional de alto nível.

  Designers completos são disputados por agências, startups, gráficas, e-commerces e empresas de todos os portes. Essa formação te prepara para trabalhar como CLT, freelancer ou empreender no mundo criativo.
modulos:
