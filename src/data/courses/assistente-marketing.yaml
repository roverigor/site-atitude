slug: assistente-marketing
nome: "Assistente de Marketing Digital"
categoria: rh-marketing
descricao_curta: "Domine marketing digital: redes sociais, anúncios, conteúdo e estratégias que geram resultados."
descricao_completa: |
  O curso de Assistente de Marketing Digital forma profissionais preparados para atuar com marketing online em empresas, agências ou como freelancers. Você vai aprender gestão de redes sociais, criação de conteúdo, anúncios pagos (Meta Ads e Google Ads), e-mail marketing, SEO e análise de métricas.

  As aulas são práticas: você cria campanhas reais, gerencia perfis de redes sociais, produz conteúdo visual com Canva, configura anúncios e aprende a interpretar métricas para tomar decisões baseadas em dados. Tudo isso com as ferramentas que o mercado realmente usa.

  O marketing digital é a área que mais cresce no Brasil, e empresas de todos os tamanhos precisam de profissionais qualificados. Com esse curso, você pode trabalhar em agências, departamentos de marketing, lojas virtuais ou iniciar sua carreira como freelancer digital.
