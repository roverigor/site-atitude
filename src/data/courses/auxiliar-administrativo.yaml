descricao_curta: "Aprenda rotinas administrativas e torne-se um profissional indispensável em qualquer empresa."
descricao_completa: |
  O curso de Auxiliar Administrativo forma profissionais para atuar nas rotinas do dia a dia de empresas, comércios e escritórios. Você vai aprender organização de documentos, atendimento telefônico, agenda, protocolo, arquivo, correspondências e apoio às atividades administrativas gerais.

  As aulas são práticas e simulam situações reais de trabalho: você aprende a redigir e-mails profissionais, organizar reuniões, controlar materiais de escritório, usar sistemas básicos e manter tudo funcionando com eficiência. Também abordamos postura profissional, ética e trabalho em equipe.

  O auxiliar administrativo é uma das funções mais procuradas no mercado de trabalho, especialmente para quem está começando a carreira. Com esse curso, você ganha experiência prática e um certificado que abre portas em empresas de todos os setores.
