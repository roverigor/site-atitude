descricao_curta: "Informática para crianças de 7 a 12 anos com metodologia lúdica, divertida e segura."
descricao_completa: |
  O Informática Kids foi desenvolvido especialmente para crianças de 7 a 12 anos que estão tendo seus primeiros contatos com o computador. Com uma metodologia lúdica e divertida, as crianças aprendem enquanto se divertem criando projetos, jogos educativos e apresentações criativas.

  O curso ensina desde o básico — como usar o mouse, teclado e navegar no computador — até habilidades mais avançadas como criar documentos, fazer pesquisas seguras na internet e montar apresentações para a escola. Tudo com linguagem acessível e atividades práticas adaptadas para cada faixa etária.

  Os pais podem ficar tranquilos: além de aprender informática, as crianças desenvolvem raciocínio lógico, criatividade e responsabilidade digital. Turmas pequenas garantem atenção individual para cada aluno.
