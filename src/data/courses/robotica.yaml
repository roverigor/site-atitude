slug: robotica
nome: "Robótica Educacional"
categoria: tecnologia
descricao_curta: "Aprenda robótica na prática: monte robôs, programe sensores e desenvolva raciocínio lógico."
descricao_completa: |
  O curso de Robótica Educacional combina tecnologia, criatividade e lógica para ensinar você a construir e programar robôs de verdade. Usando kits de robótica profissionais, você vai montar estruturas, conectar sensores e motores, e programar comportamentos inteligentes — tudo de forma prática e divertida.

  O curso desenvolve habilidades essenciais para o século 21: raciocínio lógico, resolução de problemas, trabalho em equipe e pensamento computacional. Você aprende eletrônica básica, mecânica, programação em blocos e texto, e participa de desafios que simulam competições de robótica.

  A robótica está cada vez mais presente em indústrias, agricultura, saúde e educação. Esse curso é ideal para quem quer ter uma base sólida em tecnologia e se preparar para as profissões do futuro. Alunos já participaram de competições regionais representando a Atitude.
