    carga_horaria: "16h"
    valor: 180.00
    descricao: "Teoria das cores, tipografia, composição, grid e princípios visuais essenciais"
  - nome: "Adobe Photoshop"
    carga_horaria: "32h"
    valor: 280.00
    descricao: "Edição de imagens, tratamento de fotos, montagens, efeitos e criação de peças digitais"
  - nome: "Adobe Illustrator"
    carga_horaria: "28h"
    valor: 260.00
    descricao: "Criação vetorial, logos, ícones, ilustrações e identidade visual profissional"
  - nome: "CorelDRAW"
    carga_horaria: "24h"
    valor: 240.00
    descricao: "Layout para impressão, cartões, banners, panfletos e materiais gráficos para gráficas"
  - nome: "Projeto Final e Portfólio"
