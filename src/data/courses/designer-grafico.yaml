slug: designer-gráfico
nome: "Designer Gráfico"
categoria: design
descricao_curta: "Aprenda Photoshop, Illustrator e CorelDRAW e torne-se um designer profissional requisitado pelo mercado."
descricao_completa: |
  O curso de Designer Gráfico forma profissionais criativos e tecnicamente preparados para atuar com criação visual. Você vai dominar as três principais ferramentas do mercado: Adobe Photoshop, Adobe Illustrator e CorelDRAW, criando peças gráficas reais do início ao fim.

  Das aulas práticas em laboratório saem logos, cartazes, posts para redes sociais, cartões de visita, flyers e muito mais. Você aprende os fundamentos do design — cores, tipografia, composição — e aplica tudo isso em projetos que já vão para o seu portfólio profissional.

  O designer gráfico é um dos profissionais mais procurados na região: gráficas, agências, lojas, escritórios e autônomos, todos precisam de alguém que saiba criar materiais visuais de qualidade. Esse curso é o seu passaporte para essa carreira.
