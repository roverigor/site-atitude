descricao_curta: "O curso mais completo de informática e gestão: domine o computador e as habilidades administrativas que o mercado exige."
descricao_completa: |
  O Operador Premium é o curso mais completo da Atitude Ensino. Além de todo o conteúdo do Operador de Computador — Windows, Word, Excel, PowerPoint e Internet — você ainda aprende Gestão Administrativa, Gestão Financeira, Gestão de Pessoas e Marketing.

  Esse curso foi criado para quem quer se destacar no mercado de trabalho com um perfil completo: saber usar o computador E entender como uma empresa funciona. É o diferencial que transforma um simples operador em um profissional disputado.

  Com duração de 18 meses e aulas práticas todas as semanas, você desenvolve competências técnicas e gerenciais que abrem portas para cargos de assistente, auxiliar administrativo e muito mais. Ideal para quem quer começar do zero e chegar longe.
