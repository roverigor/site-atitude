slug: maquiagem-profissional
nome: "Maquiagem Profissional"
categoria: beleza
descricao_curta: "Aprenda técnicas de maquiagem profissional e transforme sua paixão em uma carreira lucrativa."
descricao_completa: |
  O curso de Maquiagem Profissional forma maquiadoras e maquiadores preparados para atuar em salões, estúdios, eventos e como autônomos. Você vai dominar técnicas de maquiagem social, noiva, editorial e artística, usando produtos profissionais e aprendendo a valorizar cada tipo de rosto.

  As aulas são 100% práticas, com modelos reais e simulações de atendimento. Você aprende colorimetria, preparação de pele, contorno, iluminação, olhos esfumados, delineados e técnicas de fixação que duram o dia todo. Também abordamos atendimento ao cliente, precificação e como montar seu kit profissional.

  O mercado de beleza é um dos que mais crescem no Brasil, e maquiadores qualificados são muito procurados para festas, casamentos, formaturas e produções fotográficas. Saia do curso pronta para atender e faturar.
