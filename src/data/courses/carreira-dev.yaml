slug: carreira-dev
nome: "Carreira Dev (Programação Full Stack)"
categoria: carreiras-pro
descricao_curta: "Formação completa em programação web: do front-end ao back-end, pronto para o mercado tech."
descricao_completa: |
  O Carreira Dev é a formação mais completa da Atitude Ensino para quem quer se tornar programador profissional. Em 12 meses, você domina HTML, CSS, JavaScript, React, Node.js, banco de dados e APIs, construindo projetos reais que vão direto para o seu portfólio.

  O curso segue a metodologia de aprendizado por projetos: a cada módulo, você desenvolve uma aplicação funcional. Do site institucional ao sistema web completo com login, painel administrativo e banco de dados — você constrói tudo com as próprias mãos.

  Programadores são os profissionais mais demandados do mercado, com salários iniciais acima da média e possibilidade de trabalho remoto. Essa formação é o seu caminho para entrar na área de tecnologia com base sólida e portfólio profissional.
modulos:
  - nome: "Fundamentos Web (HTML, CSS, JS)"
    carga_horaria: "40h"
    valor: 280.00
    descricao: "HTML5, CSS3, JavaScript moderno, responsividade, Git e publicação de sites"
  - nome: "Front-end com React"
    carga_horaria: "36h"
    valor: 300.00
    descricao: "Componentização, hooks, rotas, consumo de APIs e criação de interfaces modernas"
  - nome: "Back-end com Node.js"
    carga_horaria: "36h"
    valor: 300.00
    descricao: "Servidores, APIs REST, autenticação, Express.js e integração com banco de dados"
  - nome: "Banco de Dados"
    carga_horaria: "24h"
    valor: 240.00
    descricao: "SQL, PostgreSQL, modelagem de dados, consultas e integração com aplicações"
  - nome: "Projeto Final Full Stack"
    carga_horaria: "20h"
    valor: 200.00
    descricao: "Desenvolvimento de aplicação completa do zero ao deploy, com portfólio profissional"
