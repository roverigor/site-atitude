descricao_curta: "Sistema interativo Evolua: informática profissional com metodologia moderna e certificação."
descricao_completa: |
  O Evolua é um sistema de ensino interativo que combina tecnologia e didática para formar profissionais de informática com qualidade. As aulas são realizadas por computador com simulações reais dos programas, garantindo que você aprenda fazendo — não apenas assistindo.

  O curso cobre as ferramentas mais pedidas pelo mercado: pacote Office, navegação na internet, redes sociais profissionais e ferramentas de comunicação empresarial. Cada lição termina com exercícios práticos e avaliações que medem seu progresso real.

  Com horários flexíveis e acompanhamento de instrutor, o Evolua é perfeito para quem trabalha ou estuda e precisa encaixar o curso na rotina. Você define seu ritmo e conta com suporte sempre que precisar.
