slug: onbyte
nome: "OnByte (Informática por Computador)"
categoria: interativos
descricao_curta: "Sistema OnByte de ensino interativo: aprenda informática com tecnologia de ponta e suporte presencial."
descricao_completa: |
  O OnByte é um dos sistemas de ensino por computador mais utilizados em escolas profissionalizantes do Brasil. Com uma plataforma moderna e intuitiva, você aprende informática através de aulas interativas que simulam os programas reais, praticando cada função passo a passo.

  O pacote completo cobre desde o básico do sistema operacional até ferramentas avançadas de escritório, internet e produtividade. O sistema registra seu progresso automaticamente e gera relatórios de desempenho para que você e o instrutor acompanhem sua evolução.

  Perfeito para quem quer aprender no próprio ritmo mas com a segurança de ter um instrutor disponível para tirar dúvidas. Os horários são flexíveis e você pode agendar suas aulas conforme sua rotina.
