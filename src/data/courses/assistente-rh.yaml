slug: assistente-rh
nome: "Assistente de RH"
categoria: rh-marketing
descricao_curta: "Aprenda rotinas de recursos humanos: recrutamento, folha de pagamento, benefícios e legislação."
descricao_completa: |
  O curso de Assistente de RH forma profissionais para atuar no departamento de recursos humanos de empresas de todos os portes. Você vai aprender recrutamento e seleção, admissão e demissão, folha de pagamento, benefícios, férias, legislação trabalhista e rotinas do departamento pessoal.

  As aulas combinam teoria e prática com simulações de processos seletivos, cálculos trabalhistas em planilhas e estudos de caso reais. Você desenvolve habilidades de comunicação, organização e gestão de pessoas que são essenciais para qualquer profissional de RH.

  O setor de recursos humanos é fundamental em todas as empresas, e profissionais qualificados são muito procurados. Com o certificado da Atitude, você estará preparado para iniciar sua carreira em RH ou agregar conhecimento se já trabalha na área administrativa.
