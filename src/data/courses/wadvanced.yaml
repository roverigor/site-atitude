slug: wadvanced
nome: "WAdvanced (Inglês Business)"
categoria: ingles
descricao_curta: "Inglês corporativo para profissionais: reuniões, e-mails, negociações e apresentações em inglês."
descricao_completa: |
  O WAdvanced é o curso de inglês voltado para o mundo dos negócios. Projetado para profissionais que já têm base no idioma e precisam usar inglês no trabalho: reuniões, e-mails, negociações, relatórios, apresentações e atendimento a clientes internacionais.

  As aulas simulam situações reais do ambiente corporativo: conference calls, pitch de vendas, entrevistas de emprego em inglês, redação de propostas comerciais e networking profissional. O vocabulário é focado em business English, com expressões e termos usados nas maiores empresas do mundo.

  Profissionais que dominam o inglês corporativo têm acesso a cargos melhores, salários maiores e oportunidades internacionais. Esse curso é o diferencial que falta para você se destacar no mercado de trabalho e avançar na carreira.
