slug: atendente-farmacia
nome: "Atendente de Farmácia"
categoria: saude
descricao_curta: "Qualifique-se para atuar em farmácias e drogarias com conhecimento técnico e atendimento de excelência."
descricao_completa: |
  O curso de Atendente de Farmácia forma profissionais qualificados para atuar em farmácias, drogarias e distribuidoras farmacêuticas. Você vai aprender desde a organização do estabelecimento até o atendimento técnico ao cliente, incluindo noções de farmacologia, legislação sanitária e boas práticas.

  O setor farmacêutico é um dos que mais empregam no Brasil, e profissionais qualificados são cada vez mais valorizados. Com esse curso, você entende as classes de medicamentos, sabe orientar clientes sobre medicamentos isentos de prescrição, conhece a legislação vigente e domina o sistema de controle de estoque.

  Além do conhecimento técnico, o curso desenvolve habilidades de atendimento humanizado — essencial para lidar com pessoas que buscam ajuda para sua saúde. Farmácias da região já procuram nossos alunos antes mesmo da formatura.
modulos:
  - nome: "Introdução à Farmácia"
    carga_horaria: "14h"
    valor: 150.00
    descricao: "História da farmácia, tipos de estabelecimentos, organização, ética e postura profissional"
  - nome: "Noções de Farmacologia"
    carga_horaria: "20h"
    valor: 200.00
    descricao: "Classes de medicamentos, formas farmacêuticas, vias de administração e cuidados básicos"
  - nome: "Legislação e Vigilância Sanitária"
    carga_horaria: "12h"
    valor: 140.00
    descricao: "ANVISA, receituário, medicamentos controlados, descarte correto e boas práticas"
  - nome: "Atendimento e Vendas"
    carga_horaria: "16h"
    valor: 160.00
    descricao: "Atendimento humanizado, técnicas de vendas, perfumaria, dermocosméticos e fidelização"
  - nome: "Controle de Estoque"
    carga_horaria: "10h"
    valor: 130.00
    descricao: "Recebimento de mercadorias, armazenamento, validade, PEPS e sistema de controle"
