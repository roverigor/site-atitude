<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .ph{font-family:'Phosphor';font-style:normal;font-size:32px;}
</style>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<div class="card">
  <div style="font-size:13px;color:var(--fg-muted);margin-bottom:14px;"><b style="color:var(--fg);">Phosphor Icons — Regular</b> (substitution, pending brand set). 1.5px stroke, rounded caps, currentColor.</div>
  <div class="row" style="gap:22px;flex-wrap:wrap;color:var(--navy-900);font-size:32px;">
    <i class="ph ph-graduation-cap"></i>
    <i class="ph ph-book-open"></i>
    <i class="ph ph-backpack"></i>
    <i class="ph ph-paint-brush"></i>
    <i class="ph ph-soccer-ball"></i>
    <i class="ph ph-music-notes"></i>
    <i class="ph ph-calendar-blank"></i>
    <i class="ph ph-chat-circle"></i>
    <i class="ph ph-heart"></i>
    <i class="ph ph-star"></i>
    <i class="ph ph-house"></i>
    <i class="ph ph-user"></i>
  </div>
</div></body></html>
