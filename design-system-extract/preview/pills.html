<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:700;font-family:var(--font-body);}
  .dot{width:8px;height:8px;border-radius:999px;}
</style>
<div class="card">
  <div class="row" style="gap:8px;flex-wrap:wrap;">
    <span class="pill" style="background:var(--lime-100);color:var(--navy-900);"><span class="dot" style="background:var(--lime-500);"></span>Educação Infantil</span>
    <span class="pill" style="background:var(--orange-100);color:var(--orange-600);"><span class="dot" style="background:var(--orange-500);"></span>Fundamental I</span>
    <span class="pill" style="background:var(--magenta-100);color:var(--magenta-600);"><span class="dot" style="background:var(--magenta-500);"></span>Fundamental II</span>
    <span class="pill" style="background:var(--violet-100);color:var(--violet-600);"><span class="dot" style="background:var(--violet-500);"></span>Ensino Médio</span>
  </div>
  <div class="row" style="gap:8px;flex-wrap:wrap;margin-top:14px;">
    <span class="pill" style="background:var(--navy-900);color:#fff;">Integral</span>
    <span class="pill" style="background:var(--navy-50);color:var(--navy-900);">Bilíngue</span>
    <span class="pill" style="background:var(--violet-500);color:#fff;">Novidade</span>
    <span class="pill" style="background:#fff;color:var(--navy-900);border:1.5px solid var(--border);">Disponível</span>
  </div>
</div></body></html>
