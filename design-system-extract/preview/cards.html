<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .acard{background:#fff;border-radius:24px;box-shadow:var(--shadow-1);overflow:hidden;display:flex;flex-direction:column;flex:1;}
  .stripe{height:8px;}
  .acard .b{padding:18px;display:flex;flex-direction:column;gap:8px;}
  .acard h4{margin:0;font:800 18px/1.2 var(--font-display);color:var(--navy-900);}
  .acard p{margin:0;font-size:13px;color:var(--navy-500);line-height:1.45;}
  .corner-pill{align-self:flex-start;background:var(--violet-100);color:var(--violet-600);font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;}
</style>
<div class="card" style="background:var(--cream-50);">
  <div class="row" style="gap:14px;align-items:stretch;">
    <div class="acard"><div class="stripe" style="background:var(--lime-500);"></div><div class="b"><h4>Educação Infantil</h4><p>Os primeiros passos numa escola que escuta. 2 a 5 anos.</p></div></div>
    <div class="acard"><div class="stripe" style="background:var(--orange-500);"></div><div class="b"><h4>Fundamental I</h4><p>Curiosidade vira repertório. 6 a 10 anos.</p></div></div>
    <div class="acard"><div class="b"><span class="corner-pill">Novidade</span><h4>Programa integral</h4><p>Da rotina escolar à oficina criativa, num só lugar.</p></div></div>
  </div>
</div></body></html>
