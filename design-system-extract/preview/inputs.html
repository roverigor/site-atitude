<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .field{display:flex;flex-direction:column;gap:6px;flex:1;}
  .field label{font-size:13px;font-weight:700;color:var(--navy-900);}
  .field input,.field select{font-family:var(--font-body);font-size:15px;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--navy-900);outline:none;transition:border-color var(--dur-fast),box-shadow var(--dur-fast);}
  .field input:focus,.field select:focus{border-color:var(--violet-500);box-shadow:0 0 0 4px rgba(87,12,232,.18);}
  .field .hint{font-size:12px;color:var(--fg-muted);}
</style>
<div class="card">
  <div class="row" style="gap:12px;align-items:flex-start;">
    <div class="field"><label>Nome do responsável</label><input value="Mariana Costa"></div>
    <div class="field"><label>Série pretendida</label><select><option>Fundamental I — 3º ano</option></select></div>
  </div>
  <div class="row" style="gap:12px;align-items:flex-start;margin-top:14px;">
    <div class="field"><label>Email</label><input placeholder="voce@exemplo.com" style="border-color:var(--violet-500);box-shadow:0 0 0 4px rgba(87,12,232,.18);"><span class="hint">Estado: focused</span></div>
    <div class="field"><label>Telefone</label><input placeholder="(11) 99999-0000"></div>
  </div>
</div></body></html>
