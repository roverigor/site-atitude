<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><div class="card" style="background:var(--cream-50);">
  <div class="row" style="gap:24px;">
    <div class="col" style="flex:1;align-items:center;gap:10px;">
      <div style="width:140px;height:80px;background:#fff;border-radius:16px;box-shadow:var(--shadow-1);"></div>
      <div style="font-size:11px;text-align:center;"><b>--shadow-1</b><br><span style="color:var(--fg-muted);">resting card</span></div>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:10px;">
      <div style="width:140px;height:80px;background:#fff;border-radius:16px;box-shadow:var(--shadow-2);"></div>
      <div style="font-size:11px;text-align:center;"><b>--shadow-2</b><br><span style="color:var(--fg-muted);">hover, modal</span></div>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:10px;">
      <div style="width:140px;height:80px;background:#fff;border-radius:16px;box-shadow:var(--shadow-3);"></div>
      <div style="font-size:11px;text-align:center;"><b>--shadow-3</b><br><span style="color:var(--fg-muted);">overlay</span></div>
    </div>
    <div class="col" style="flex:1;align-items:center;gap:10px;">
      <div style="width:140px;height:80px;background:#fff;border-radius:16px;box-shadow:var(--shadow-focus);"></div>
      <div style="font-size:11px;text-align:center;"><b>--shadow-focus</b><br><span style="color:var(--fg-muted);">keyboard focus</span></div>
    </div>
  </div>
</div></body></html>
