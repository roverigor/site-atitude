<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><div class="card">
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    
    <div class="swatch" style="flex:1;min-width:120px;">
      <div class="chip" style="background:#252566;color:#fff;height:90px;display:flex;align-items:flex-end;font-weight:800;">Navy</div>
      <div class="meta"><b>--navy-900</b><span>#252566</span></div>
    </div>
    <div class="swatch" style="flex:1;min-width:120px;">
      <div class="chip" style="background:#6EDD17;color:#252566;height:90px;display:flex;align-items:flex-end;font-weight:800;">Lime</div>
      <div class="meta"><b>--lime-500</b><span>#6EDD17</span></div>
    </div>
    <div class="swatch" style="flex:1;min-width:120px;">
      <div class="chip" style="background:#FF4E09;color:#fff;height:90px;display:flex;align-items:flex-end;font-weight:800;">Orange</div>
      <div class="meta"><b>--orange-500</b><span>#FF4E09</span></div>
    </div>
    <div class="swatch" style="flex:1;min-width:120px;">
      <div class="chip" style="background:#FF004A;color:#fff;height:90px;display:flex;align-items:flex-end;font-weight:800;">Magenta</div>
      <div class="meta"><b>--magenta-500</b><span>#FF004A</span></div>
    </div>
    <div class="swatch" style="flex:1;min-width:120px;">
      <div class="chip" style="background:#570CE8;color:#fff;height:90px;display:flex;align-items:flex-end;font-weight:800;">Violet</div>
      <div class="meta"><b>--violet-500</b><span>#570CE8</span></div>
    </div>
  </div>
</div></body></html>
