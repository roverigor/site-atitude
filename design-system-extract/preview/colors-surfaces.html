<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><div class="card">
  <div class="row" style="gap:12px;">
    <div class="col" style="flex:1;">
      <div style="background:#FFF8EF;height:90px;border-radius:12px;border:1.5px solid var(--border);"></div>
      <div style="font-size:11px;"><b>--cream-50</b> · page bg<br><span style="color:var(--fg-muted);">#FFF8EF</span></div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#FAEFE0;height:90px;border-radius:12px;border:1.5px solid var(--border);"></div>
      <div style="font-size:11px;"><b>--cream-100</b> · section bg<br><span style="color:var(--fg-muted);">#FAEFE0</span></div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#fff;height:90px;border-radius:12px;box-shadow:var(--shadow-1);"></div>
      <div style="font-size:11px;"><b>--paper</b> · card<br><span style="color:var(--fg-muted);">#FFFFFF</span></div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#252566;height:90px;border-radius:12px;"></div>
      <div style="font-size:11px;"><b>--bg-inverse</b> · dark<br><span style="color:var(--fg-muted);">#252566</span></div>
    </div>
  </div>
</div></body></html>
