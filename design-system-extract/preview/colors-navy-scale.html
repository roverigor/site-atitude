<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><div class="card">
  <div class="row" style="gap:8px;">
    
    <div class="col" style="flex:1;">
      <div style="background:#F2F2F9;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-50</b><br>#F2F2F9</div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#E6E6F2;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-100</b><br>#E6E6F2</div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#B7B7DA;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-300</b><br>#B7B7DA</div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#6B6BB4;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-500</b><br>#6B6BB4</div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#3B3B8C;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-700</b><br>#3B3B8C</div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#2E2E78;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-800</b><br>#2E2E78</div>
    </div>
    <div class="col" style="flex:1;">
      <div style="background:#252566;height:80px;border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);"><b style="color:var(--fg);">navy-900</b><br>#252566</div>
    </div>
  </div>
</div></body></html>
