<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><div class="card">
  <div class="row" style="gap:14px;align-items:flex-end;">
    
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:84px;height:84px;background:var(--navy-900);border-radius:6px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);text-align:center;"><b style="color:var(--fg);">xs</b><br>6px</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:84px;height:84px;background:var(--navy-900);border-radius:12px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);text-align:center;"><b style="color:var(--fg);">sm</b><br>12px</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:84px;height:84px;background:var(--navy-900);border-radius:16px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);text-align:center;"><b style="color:var(--fg);">md</b><br>16px</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:84px;height:84px;background:var(--navy-900);border-radius:24px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);text-align:center;"><b style="color:var(--fg);">lg</b><br>24px</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:84px;height:84px;background:var(--navy-900);border-radius:32px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);text-align:center;"><b style="color:var(--fg);">xl</b><br>32px</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:84px;height:84px;background:var(--navy-900);border-radius:999px;"></div>
      <div style="font-size:11px;color:var(--fg-muted);text-align:center;"><b style="color:var(--fg);">pill</b><br>999px</div>
    </div>
  </div>
</div></body></html>
