<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .btn{font-family:var(--font-body);font-weight:700;border-radius:999px;padding:14px 28px;font-size:16px;border:none;cursor:pointer;transition:transform var(--dur-fast) var(--ease-pop), background var(--dur-fast);}
  .btn:hover{transform:scale(1.02);}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--navy-900);color:#fff;}
  .btn-primary:hover{background:#1A1A52;}
  .btn-violet{background:var(--violet-500);color:#fff;}
  .btn-violet:hover{background:var(--violet-600);}
  .btn-magenta{background:var(--magenta-500);color:#fff;}
  .btn-ghost{background:transparent;color:var(--navy-900);border:1.5px solid var(--navy-900);}
  .btn-ghost:hover{background:var(--navy-900);color:#fff;}
  .btn-text{background:transparent;color:var(--violet-500);padding:14px 8px;}
  .btn-text:hover{color:var(--violet-600);}
</style>
<div class="card">
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <button class="btn btn-primary">Agende uma visita</button>
    <button class="btn btn-violet">Conheça a escola</button>
    <button class="btn btn-magenta">Inscreva-se</button>
    <button class="btn btn-ghost">Saiba mais</button>
    <button class="btn btn-text">Falar com a gente →</button>
  </div>
</div></body></html>
