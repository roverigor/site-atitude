<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><div class="card" style="display:flex;gap:24px;align-items:center;justify-content:center;background:var(--cream-50);min-height:200px;">
  <img src="../assets/logo-atitude-mark.png" alt="Atitude mark" style="height:170px;">
  <div style="font-size:12px;color:var(--fg-muted);max-width:200px;line-height:1.45;">Vertical stack — for tight layouts, app icons, and merch. Clearspace = height of one accent capsule on every side.</div>
</div></body></html>
