<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .mball{width:32px;height:32px;border-radius:999px;background:var(--violet-500);position:absolute;left:0;animation:slide 1800ms infinite var(--ease-pop);}
  .mball.lin{background:var(--navy-300);animation-timing-function:linear;}
  @keyframes slide{0%{left:0;}50%{left:calc(100% - 32px);}100%{left:0;}}
  .track{position:relative;height:32px;background:var(--navy-50);border-radius:999px;flex:1;}
</style>
<div class="card" style="display:flex;flex-direction:column;gap:10px;">
  <div style="display:flex;align-items:center;gap:12px;"><div style="font-size:11px;color:var(--fg-muted);width:120px;"><b style="color:var(--fg);">--ease-pop</b><br>cubic-bezier(.2,.8,.2,1)</div><div class="track"><div class="mball"></div></div></div>
  <div style="display:flex;align-items:center;gap:12px;"><div style="font-size:11px;color:var(--fg-muted);width:120px;"><b style="color:var(--fg);">--ease-linear</b><br>linear (rare)</div><div class="track"><div class="mball lin"></div></div></div>
  <div style="display:flex;gap:16px;margin-top:4px;font-size:11px;color:var(--fg-muted);">
    <span><b style="color:var(--fg);">--dur-fast</b> 150ms · hover</span>
    <span><b style="color:var(--fg);">--dur-base</b> 250ms · cards</span>
    <span><b style="color:var(--fg);">--dur-slow</b> 400ms · pages</span>
  </div>
</div></body></html>
