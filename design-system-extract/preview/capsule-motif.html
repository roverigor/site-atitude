<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-50);font-family:var(--font-body);color:var(--fg);}
  .card{padding:24px;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{border-radius:var(--radius-md);box-shadow:var(--shadow-1);overflow:hidden;}
  .swatch .chip{padding:14px 16px;color:var(--paper);}
  .swatch .meta{background:var(--paper);padding:8px 12px;font-size:12px;color:var(--fg-muted);display:flex;justify-content:space-between;}
  .swatch .meta b{color:var(--fg);font-weight:700;}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);font-weight:700;}
</style></head><body><style>
  .cap{height:36px;border-radius:999px;display:inline-block;}
</style>
<div class="card">
  <div style="font-size:13px;color:var(--fg-muted);margin-bottom:12px;">The capsule. One motif, four colors, infinite arrangements — the visual DNA of the brand.</div>
  <div class="row" style="gap:8px;align-items:center;flex-wrap:wrap;">
    <span class="cap" style="background:var(--lime-500);width:80px;"></span>
    <span class="cap" style="background:var(--orange-500);width:140px;"></span>
    <span class="cap" style="background:var(--magenta-500);width:60px;"></span>
    <span class="cap" style="background:var(--violet-500);width:180px;"></span>
    <span class="cap" style="background:var(--navy-900);width:48px;"></span>
  </div>
  <div class="row" style="gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;">
    <span class="cap" style="background:var(--navy-900);width:200px;"></span>
    <span class="cap" style="background:var(--lime-500);width:48px;"></span>
    <span class="cap" style="background:var(--magenta-500);width:120px;"></span>
    <span class="cap" style="background:var(--orange-500);width:80px;"></span>
  </div>
</div></body></html>
